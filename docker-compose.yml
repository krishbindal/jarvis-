version: "3.7"

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: jarvis_n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Kolkata
      # Set to true to disable authentication for easy local integration. 
      # WARNING: Do not expose this port to the internet.
      - N8N_USER_MANAGEMENT_DISABLED=true 
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
